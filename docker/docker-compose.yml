services:
  ros:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ros
    image: brickbot/ros:jazzy
    container_name: brickbot_ros
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - ROS_DOMAIN_ID=42
      - QT_X11_NO_MITSHM=1
      - GZ_PARTITION=brickbot
      - GZ_TRANSPORT_TOPIC_STATISTICS=1
    volumes:
      - ../brickbot_ws:/ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/dri:/dev/dri
    stdin_open: true
    tty: true
    command: bash

  hmi:
    build:
      context: ..
      dockerfile: docker/Dockerfile.hmi
    image: brickbot/hmi:dev
    container_name: brickbot_hmi
    network_mode: host
    volumes:
      - ../brickbot-hmi/src:/app/src
      - ../brickbot-hmi/public:/app/public
      - ../brickbot-hmi/index.html:/app/index.html
      - ../brickbot-hmi/vite.config.ts:/app/vite.config.ts
      - ../brickbot-hmi/tsconfig.json:/app/tsconfig.json
      - ../brickbot-hmi/tailwind.config.js:/app/tailwind.config.js
      - ../brickbot-hmi/postcss.config.js:/app/postcss.config.js
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
