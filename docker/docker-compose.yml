services:
  ros:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ros
    image: vika/ros:jazzy
    container_name: vika_ros
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    user: "1000:1000"
    # Native Linux: grant access to /dev/dri render nodes (host video=44, render=110 GIDs)
    group_add:
      - "44"
      - "110"
    # GUI: X11 passthrough + NVIDIA dGPU via the container toolkit (== `--gpus all`).
    # The 3D viewport renders on the RTX. Gazebo's GUI must use the ogre1 render
    # engine (--render-engine-gui ogre) — ogre2 segfaults on NVIDIA/Xwayland.
    # Run `xhost +` on the host first.
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY:-:1}
      - ROS_DOMAIN_ID=42
      - QT_X11_NO_MITSHM=1
      - GZ_PARTITION=vika
      - GZ_IP=127.0.0.1
      - GZ_TRANSPORT_TOPIC_STATISTICS=1
      - XDG_RUNTIME_DIR=/run/user/1000
      - HOME=/tmp
      # NVIDIA Container Toolkit: expose the dGPU with graphics + display caps
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - __GLX_VENDOR_LIBRARY_NAME=nvidia
    volumes:
      - ../vika_ws:/ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /run/user/1000:/run/user/1000
    devices:
      - /dev/dri:/dev/dri
    stdin_open: true
    tty: true
    command: bash

  hmi:
    build:
      context: ..
      dockerfile: docker/Dockerfile.hmi
    image: vika/hmi:dev
    container_name: vika_hmi
    network_mode: host
    volumes:
      - ../vika-hmi/src:/app/src
      - ../vika-hmi/public:/app/public
      - ../vika-hmi/index.html:/app/index.html
      - ../vika-hmi/vite.config.ts:/app/vite.config.ts
      - ../vika-hmi/tsconfig.json:/app/tsconfig.json
      - ../vika-hmi/tailwind.config.js:/app/tailwind.config.js
      - ../vika-hmi/postcss.config.js:/app/postcss.config.js
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
