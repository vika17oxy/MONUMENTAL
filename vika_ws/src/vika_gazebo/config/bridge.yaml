# ros_gz_bridge topic mapping
# Extended as robots and sensors come online.
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# NOTE: the tracked mobile base (DiffDrive / cmd_vel) was replaced by a linear
# rail. The carriage is driven through ros2_control (rail_controller), not gz
# cmd_vel, so the cmd_vel bridges were removed.

# Vacuum gripper attach/detach (gz DetachableJoint trigger topics). ONE joint per
# dynamic pick-ROW r{si}_0 (3 rows = flat 3x3 pallet supply, 3 fused bricks each).
# Empty msg attaches/detaches the whole row. The wall grows as STATIC bricks
# (lay_course.sh) and the used row respawns to its pallet slot. ROS -> GZ.
- ros_topic_name: "/suction/r0_0/attach"
  gz_topic_name: "/suction/r0_0/attach"
  ros_type_name: "std_msgs/msg/Empty"
  gz_type_name: "gz.msgs.Empty"
  direction: ROS_TO_GZ
- ros_topic_name: "/suction/r0_0/detach"
  gz_topic_name: "/suction/r0_0/detach"
  ros_type_name: "std_msgs/msg/Empty"
  gz_type_name: "gz.msgs.Empty"
  direction: ROS_TO_GZ

# Wrist camera (robot_a gripper) — image + camera_info for the DINO brick
# detector and the HMI wrist view. GZ -> ROS.
- ros_topic_name: "/robot_a/wrist_cam/image"
  gz_topic_name: "/wrist_cam"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS
- ros_topic_name: "/robot_a/wrist_cam/camera_info"
  gz_topic_name: "/wrist_cam/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS

# Wrist camera (robot_b cement tool) — for DINO cement-following along the wall.
# gz scopes the sensor topic with the TOOL prefix (robot_b_arm_), so the real gz
# topic is /robot_b_arm_wrist_cam (not /robot_b_wrist_cam).
- ros_topic_name: "/robot_b/wrist_cam/image"
  gz_topic_name: "/robot_b_arm_wrist_cam"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS
- ros_topic_name: "/robot_b/wrist_cam/camera_info"
  gz_topic_name: "/robot_b_arm_wrist_cam/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS
