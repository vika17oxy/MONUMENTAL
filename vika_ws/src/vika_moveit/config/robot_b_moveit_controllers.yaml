# MoveIt -> ros2_control bridge. The arm_controller (JointTrajectoryController)
# already runs inside gz_ros2_control under the /robot_b namespace, so the
# controller name is the ABSOLUTE action path; MoveIt sends FollowJointTrajectory
# goals to /robot_b/arm_controller/follow_joint_trajectory.
moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - /robot_b/arm_controller
    - /robot_b/cement_controller

  /robot_b/arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - robot_b_arm_j1
      - robot_b_arm_j2
      - robot_b_arm_j3
      - robot_b_arm_j4
      - robot_b_arm_j5
      - robot_b_arm_j6

  # the cement nozzle angle is in the IK chain, so MoveIt must be able to
  # actuate it too — its own JointTrajectoryController handles it.
  /robot_b/cement_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - robot_b_arm_cement_angle
